name: Build, Test & Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_backend_integration:
        description: 'Run backend integration tests (after code analysis)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend_unit_test:
    name: Backend Unit Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend unit tests
        run: >-
          mvn -B -ntp
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*Test,!*IntegrationTest,!*ApplicationTests'
          test

  backend_build:
    name: Backend Build (Maven)
    runs-on: ubuntu-latest
    needs:
      - backend_unit_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend artifacts
        run: mvn -B -ntp -DskipTests clean package

  frontend_test:
    name: Frontend Test (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --watch=false

  frontend_build:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest
    needs: frontend_test
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend_analysis:
    name: Backend Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    needs:
      - backend_build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install backend modules (no tests)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          install

      - name: Run Checkstyle reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:checkstyle

      - name: Run SpotBugs reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs

      - name: Upload backend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-analysis-reports
          path: |
            services/**/target/checkstyle-result.xml
            services/**/target/spotbugsXml.xml
          if-no-files-found: warn

  frontend_analysis:
    name: Frontend Analysis (TypeCheck + npm audit)
    runs-on: ubuntu-latest
    needs:
      - frontend_build
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: npm audit (high+)
        run: npm audit --audit-level=high --json > npm-audit.json
        continue-on-error: true

      - name: Upload frontend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-analysis-reports
          path: frontend/sensecore-web/npm-audit.json
          if-no-files-found: warn

  backend_integration_test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_backend_integration }}
    name: Backend Integration Test (Maven)
    runs-on: ubuntu-latest
    needs:
      - backend_analysis
      - frontend_analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend integration tests (selected modules)
        run: >-
          mvn -B -ntp
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*IntegrationTest,*ApplicationTests'
          test

