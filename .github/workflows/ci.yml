name: Build, Test & Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_backend_integration:
        description: 'Run backend integration tests (after code analysis)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend_unit_test:
    name: Backend Unit Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend unit tests
        run: >-
          mvn -B -ntp
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*Test,!*IntegrationTest,!*ApplicationTests'
          test

      - name: Upload backend unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-reports
          path: services/**/target/surefire-reports/*.xml


  backend_build:
    name: Backend Build (Maven)
    runs-on: ubuntu-latest
    needs:
      - backend_unit_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend artifacts
        run: mvn -B -ntp -DskipTests clean package

  frontend_test:
    name: Frontend Test (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (JUnit report)
        shell: bash
        run: |
          mkdir -p test-results
          npm test -- --watch=false --reporters=junit --output-file=test-results/frontend-junit.xml

      - name: Upload frontend unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-unit-test-report
          path: frontend/sensecore-web/test-results/frontend-junit.xml


  unit_test_summary:
    name: Unit Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend_unit_test
      - frontend_test

    steps:
      - name: Download backend unit test reports
        uses: actions/download-artifact@v7
        with:
          name: backend-unit-test-reports
          path: unit-test-reports/backend

      - name: Download frontend unit test report
        uses: actions/download-artifact@v7
        with:
          name: frontend-unit-test-report
          path: unit-test-reports/frontend

      - name: Summarize unit tests (backend + frontend)
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          def collect(paths):
              totals = {'tests': 0, 'failures': 0, 'errors': 0, 'skipped': 0}
              files = 0
              for pattern in paths:
                  for fp in glob.glob(pattern, recursive=True):
                      files += 1
                      try:
                          root = ET.parse(fp).getroot()
                      except Exception:
                          continue

                      suites = []
                      if root.tag == 'testsuite':
                          suites = [root]
                      elif root.tag == 'testsuites':
                          suites = root.findall('testsuite')

                      for s in suites:
                          totals['tests'] += int(s.attrib.get('tests', 0) or 0)
                          totals['failures'] += int(s.attrib.get('failures', 0) or 0)
                          totals['errors'] += int(s.attrib.get('errors', 0) or 0)
                          totals['skipped'] += int(s.attrib.get('skipped', 0) or 0)
              return files, totals

          def write_table(f, title, files, totals):
              passed = max(0, totals['tests'] - totals['failures'] - totals['errors'] - totals['skipped'])
              f.write(f"### {title}\n\n")
              f.write(f"Parsed report files: {files}\n\n")
              f.write("| Metric | Value |\n")
              f.write("|---|---:|\n")
              f.write(f"| Total | {totals['tests']} |\n")
              f.write(f"| Passed | {passed} |\n")
              f.write(f"| Failed | {totals['failures']} |\n")
              f.write(f"| Errors | {totals['errors']} |\n")
              f.write(f"| Skipped | {totals['skipped']} |\n\n")

          backend_files, backend = collect(['unit-test-reports/backend/**/*.xml'])
          frontend_files, frontend = collect(['unit-test-reports/frontend/**/*.xml'])

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a', encoding='utf-8') as f:
                  f.write("## Unit Tests\n\n")
                  write_table(f, 'Backend Unit Tests', backend_files, backend)
                  write_table(f, 'Frontend Unit Tests', frontend_files, frontend)
          PY

  frontend_build:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest
    needs: frontend_test
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend_analysis:
    name: Backend Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    needs:
      - backend_build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install backend modules (no tests)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          install

      - name: Run Checkstyle reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:checkstyle

      - name: Run SpotBugs reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs

      - name: Upload backend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-analysis-reports
          path: |
            services/**/target/checkstyle-result.xml
            services/**/target/spotbugsXml.xml

  frontend_analysis:
    name: Frontend Analysis (TypeCheck + npm audit)
    runs-on: ubuntu-latest
    needs:
      - frontend_build
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: npm audit (high+)
        shell: bash
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Summarize npm audit
        if: always()
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summary = process.env.GITHUB_STEP_SUMMARY;

          let vulnerabilities = { critical: 0, high: 0, moderate: 0, low: 0 };
          try {
            const raw = fs.readFileSync('npm-audit.json', 'utf8');
            const data = JSON.parse(raw);
            const meta = (data.metadata && data.metadata.vulnerabilities) || {};
            vulnerabilities = {
              critical: meta.critical || 0,
              high: meta.high || 0,
              moderate: meta.moderate || 0,
              low: meta.low || 0
            };
          } catch (_) {
            // Keep default zero values when report is missing or invalid.
          }

          if (summary) {
            fs.appendFileSync(summary,
              '### Frontend npm audit\n\n' +
              '| Level | Count |\n' +
              '|---|---:|\n' +
              `| Critical | ${vulnerabilities.critical} |\n` +
              `| High | ${vulnerabilities.high} |\n` +
              `| Moderate | ${vulnerabilities.moderate} |\n` +
              `| Low | ${vulnerabilities.low} |\n`
            );
          }
          NODE

      - name: Upload frontend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-analysis-reports
          path: frontend/sensecore-web/npm-audit.json

  backend_integration_test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_backend_integration }}
    name: Backend Integration Test (Maven)
    runs-on: ubuntu-latest
    needs:
      - backend_analysis
      - frontend_analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend integration tests (selected modules)
        run: >-
          mvn -B -ntp
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*IntegrationTest,*ApplicationTests'
          test





