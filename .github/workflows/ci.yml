name: Build, Test & Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_backend_integration:
        description: 'Run backend integration tests (after code analysis)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend_unit_test:
    name: Backend Unit Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend unit tests
        run: >-
          mvn -B -ntp
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*Test,!*IntegrationTest,!*ApplicationTests'
          test

      - name: Upload backend unit test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-unit-test-reports
          path: services/**/target/surefire-reports/*.xml


  backend_build:
    name: Backend Build (Maven)
    runs-on: ubuntu-latest
    needs:
      - backend_unit_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend artifacts
        run: mvn -B -ntp -DskipTests clean package

  frontend_test:
    name: Frontend Test (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (JUnit report)
        shell: bash
        run: |
          mkdir -p test-results
          npm test -- --watch=false --reporters=junit --output-file=test-results/frontend-junit.xml

      - name: Upload frontend unit test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-unit-test-report
          path: frontend/sensecore-web/test-results/frontend-junit.xml


  unit_test_summary:
    name: Unit Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend_unit_test
      - frontend_test

    steps:
      - name: Download backend unit test reports
        uses: actions/download-artifact@v7
        with:
          name: backend-unit-test-reports
          path: unit-test-reports/backend

      - name: Download frontend unit test report
        uses: actions/download-artifact@v7
        with:
          name: frontend-unit-test-report
          path: unit-test-reports/frontend

      - name: Summarize unit tests (backend + frontend)
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          def collect(paths):
              totals = {'tests': 0, 'failures': 0, 'errors': 0, 'skipped': 0}
              files = 0
              for pattern in paths:
                  for fp in glob.glob(pattern, recursive=True):
                      files += 1
                      try:
                          root = ET.parse(fp).getroot()
                      except Exception:
                          continue

                      suites = []
                      if root.tag == 'testsuite':
                          suites = [root]
                      elif root.tag == 'testsuites':
                          suites = root.findall('testsuite')

                      for s in suites:
                          totals['tests'] += int(s.attrib.get('tests', 0) or 0)
                          totals['failures'] += int(s.attrib.get('failures', 0) or 0)
                          totals['errors'] += int(s.attrib.get('errors', 0) or 0)
                          totals['skipped'] += int(s.attrib.get('skipped', 0) or 0)
              return files, totals

          def write_table(f, title, files, totals):
              passed = max(0, totals['tests'] - totals['failures'] - totals['errors'] - totals['skipped'])
              f.write(f"### {title}\n\n")
              f.write(f"Parsed report files: {files}\n\n")
              f.write("| Metric | Value |\n")
              f.write("|---|---:|\n")
              f.write(f"| Total | {totals['tests']} |\n")
              f.write(f"| Passed | {passed} |\n")
              f.write(f"| Failed | {totals['failures']} |\n")
              f.write(f"| Errors | {totals['errors']} |\n")
              f.write(f"| Skipped | {totals['skipped']} |\n\n")

          backend_files, backend = collect(['unit-test-reports/backend/**/*.xml'])
          frontend_files, frontend = collect(['unit-test-reports/frontend/**/*.xml'])

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a', encoding='utf-8') as f:
                  f.write("## Unit Tests\n\n")
                  write_table(f, 'Backend Unit Tests', backend_files, backend)
                  write_table(f, 'Frontend Unit Tests', frontend_files, frontend)
          PY

  frontend_build:
    name: Frontend Build (Angular)
    runs-on: ubuntu-latest
    needs: frontend_test
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend_analysis:
    name: Backend Analysis (Checkstyle + SpotBugs)
    runs-on: ubuntu-latest
    needs:
      - backend_build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install backend modules (no tests)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          install

      - name: Run Checkstyle reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          org.apache.maven.plugins:maven-checkstyle-plugin:3.6.0:checkstyle

      - name: Run SpotBugs reports (backend modules)
        run: >-
          mvn -B -ntp -DskipTests
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs


      - name: Upload backend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-analysis-reports
          path: |
            services/**/target/checkstyle-result.xml
            services/**/target/spotbugsXml.xml

  frontend_analysis:
    name: Frontend Analysis (TypeCheck + npm audit)
    runs-on: ubuntu-latest
    needs:
      - frontend_build
    defaults:
      run:
        working-directory: frontend/sensecore-web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/sensecore-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: npm audit (high+)
        shell: bash
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Upload frontend analysis reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-analysis-reports
          path: frontend/sensecore-web/npm-audit.json

  analysis_summary:
    name: Code Analysis Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend_analysis
      - frontend_analysis

    steps:
      - name: Download backend analysis reports
        uses: actions/download-artifact@v7
        with:
          name: backend-analysis-reports
          path: analysis-reports/backend

      - name: Download frontend analysis reports
        uses: actions/download-artifact@v7
        with:
          name: frontend-analysis-reports
          path: analysis-reports/frontend

      - name: Summarize code analysis
        shell: bash
        run: |
          python3 - <<'PY'
          import glob
          import json
          import os
          import xml.etree.ElementTree as ET

          checkstyle_files = glob.glob('analysis-reports/backend/**/checkstyle-result.xml', recursive=True)
          spotbugs_files = glob.glob('analysis-reports/backend/**/spotbugsXml.xml', recursive=True)

          checkstyle_issues = 0
          for fp in checkstyle_files:
              try:
                  root = ET.parse(fp).getroot()
                  checkstyle_issues += len(root.findall('.//error'))
              except Exception:
                  pass

          spotbugs_total = 0
          spotbugs_high = 0
          for fp in spotbugs_files:
              try:
                  root = ET.parse(fp).getroot()
                  bugs = root.findall('.//BugInstance')
                  spotbugs_total += len(bugs)
                  for bug in bugs:
                      if bug.attrib.get('priority', '') == '1':
                          spotbugs_high += 1
              except Exception:
                  pass

          vulnerabilities = {'critical': 0, 'high': 0, 'moderate': 0, 'low': 0}
          npm_files = glob.glob('analysis-reports/frontend/**/*.json', recursive=True)
          if npm_files:
              try:
                  with open(npm_files[0], encoding='utf-8') as f:
                      data = json.load(f)
                  meta = ((data or {}).get('metadata') or {}).get('vulnerabilities') or {}
                  vulnerabilities = {
                      'critical': int(meta.get('critical', 0) or 0),
                      'high': int(meta.get('high', 0) or 0),
                      'moderate': int(meta.get('moderate', 0) or 0),
                      'low': int(meta.get('low', 0) or 0),
                  }
              except Exception:
                  pass

          summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary:
              with open(summary, 'a', encoding='utf-8') as f:
                  f.write('## Code Analysis\n\n')
                  f.write('### Backend Analysis\n\n')
                  f.write('| Analyzer | Files | Findings |\n')
                  f.write('|---|---:|---:|\n')
                  f.write(f'| Checkstyle | {len(checkstyle_files)} | {checkstyle_issues} |\n')
                  f.write(f'| SpotBugs (total) | {len(spotbugs_files)} | {spotbugs_total} |\n')
                  f.write(f'| SpotBugs (high priority) | {len(spotbugs_files)} | {spotbugs_high} |\n\n')
                  f.write('### Frontend npm audit\n\n')
                  f.write('| Level | Count |\n')
                  f.write('|---|---:|\n')
                  f.write(f"| Critical | {vulnerabilities['critical']} |\n")
                  f.write(f"| High | {vulnerabilities['high']} |\n")
                  f.write(f"| Moderate | {vulnerabilities['moderate']} |\n")
                  f.write(f"| Low | {vulnerabilities['low']} |\n")
          PY

  backend_integration_test:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_backend_integration }}
    name: Backend Integration Test (Maven)
    runs-on: ubuntu-latest
    needs:
      - analysis_summary

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend integration tests (selected modules)
        run: >-
          mvn -B -ntp
          -pl services/ingestion-service,services/processor-service,services/query-service
          -am
          -Dsurefire.failIfNoSpecifiedTests=false
          -Dtest='*IntegrationTest,*ApplicationTests'
          test
