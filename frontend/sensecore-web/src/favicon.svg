<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SenseCore">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00d4ff" />
      <stop offset="1" stop-color="#00ff9a" />
    </linearGradient>
    <radialGradient id="r" cx="0.65" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <style>
      @keyframes pulse { 0% { r: 44; opacity: 0.9; } 70% { r: 120; opacity: 0.1; } 100% { r: 44; opacity: 0.9; } }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0b0f1a" />
  <g transform="translate(256 256)">
    <g style="animation: spin 10s linear infinite; transform-origin: 0 0;">
      <circle cx="0" cy="0" r="170" fill="none" stroke="url(#g)" stroke-width="26" />
      <circle cx="0" cy="0" r="112" fill="none" stroke="#1f2937" stroke-width="18" />
      <path d="M0 -170 L0 -140" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" />
      <path d="M0 170 L0 140" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" />
      <path d="-170 0 L-140 0" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" />
      <path d="170 0 L140 0" stroke="#00d4ff" stroke-width="14" stroke-linecap="round" />
      <path d="-120 -120 L-90 -90" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" />
      <path d="120 120 L90 90" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" />
      <path d="120 -120 L90 -90" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" />
      <path d="-120 120 L-90 90" stroke="#00d4ff" stroke-width="12" stroke-linecap="round" />
    </g>
    <circle cx="0" cy="0" r="44" fill="#00ff9a" />
    <circle cx="0" cy="0" r="44" fill="#00ff9a" style="animation: pulse 2.8s ease-in-out infinite;" />
  </g>
  <circle cx="256" cy="256" r="170" fill="url(#r)" />
</svg>
