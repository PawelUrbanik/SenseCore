<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      @keyframes pulse { 0% { r: 5; opacity: 0.9; } 70% { r: 14; opacity: 0.15; } 100% { r: 5; opacity: 0.9; } }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0b0f1a" />
  <g transform="translate(32 32)">
    <g style="animation: spin 6s linear infinite; transform-origin: 0 0;">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#00d4ff" stroke-width="4" />
      <circle cx="0" cy="0" r="12" fill="none" stroke="#1f2937" stroke-width="3" />
      <path d="M0 -20 L0 -14" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" />
      <path d="M0 20 L0 14" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" />
      <path d="-20 0 L-14 0" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" />
      <path d="20 0 L14 0" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" />
    </g>
    <circle cx="0" cy="0" r="5" fill="#00ff9a" />
    <circle cx="0" cy="0" r="5" fill="#00ff9a" style="animation: pulse 2.4s ease-in-out infinite;" />
  </g>
</svg>
